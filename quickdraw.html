<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QBV6VN2F9G"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){ dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-QBV6VN2F9G');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Draw - Triple Nickel</title>
    <link rel="stylesheet" href="shared-sidebar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: white;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: clamp(10px, 2vw, 20px);
            overflow-x: hidden;
        }

        .main-container {
            max-width: 100vw;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: row;
        }

        .content-wrapper {
            flex: 1;
            margin-left: clamp(250px, 20vw, 300px);
            padding: clamp(30px, 4vw, 60px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }

        .content-wrapper.expanded {
            margin-left: 0;
        }

        .coming-soon {
            text-align: center;
            max-width: 500px;
        }

        .coming-soon-icon {
            font-size: clamp(4rem, 10vw, 6rem);
            margin-bottom: 24px;
        }

        .coming-soon-title {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #ea580c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .coming-soon-subtitle {
            font-size: clamp(1rem, 2vw, 1.3rem);
            color: #94a3b8;
            line-height: 1.7;
            margin-bottom: 32px;
        }

        .coming-soon-badge {
            display: inline-block;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid rgba(251, 191, 36, 0.3);
            color: #fbbf24;
        }

        @media (max-width: 768px) {
            body { padding: 0; }

            .content-wrapper {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="shared-navigation"></div>

    <div class="main-container">
        <div class="content-wrapper main-content" id="contentWrapper">
            <div class="coming-soon">
                <div class="coming-soon-icon">⚡</div>
                <h1 class="coming-soon-title">Quick Draw</h1>
                <p class="coming-soon-subtitle">
                    Speed throwing challenge coming soon. Get ready to test your fastest throws against the clock.
                </p>
                <span class="coming-soon-badge">Coming Soon</span>
            </div>
        </div>
    </div>

    <script src="shared-sidebar.js"></script>
</body>
</html>
