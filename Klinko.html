<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klinko — Ring Drop Target</title>
    <link rel="stylesheet" href="shared-sidebar.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            --bg: #0a0a0f;
            --bg-glow: #1a0a30;
            --board-bg: #1a1225;
            --board-border: #4a2a8a;
            --board-glow: rgba(74, 42, 138, 0.4);
            --panel-bg: rgba(26, 18, 37, 0.9);
            --modal-bg: #1a1225;
            --btn-hover-bg: rgba(74, 42, 138, 0.5);
            --peg-color: #8866cc;
            --peg-glow: rgba(136, 102, 204, 0.6);
            --ring-color: #ffd700;
            --ring-glow: rgba(255, 215, 0, 0.8);
            --slot-high: #ff3366;
            --slot-mid: #ff8800;
            --slot-low: #33ccff;
            --text-color: #e0d0ff;
            --scanline: rgba(0,0,0,0.06);
            --gold: #ffd700;
            --retro-green: #33ff33;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            overflow: hidden;
            font-family: 'VT323', monospace;
            user-select: none;
            cursor: crosshair;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 40%, var(--bg-glow) 0%, var(--bg) 70%);
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scanline) 2px, var(--scanline) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        #game-container {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        #game-container.main-content {
            position: absolute;
            margin-left: clamp(250px, 20vw, 300px);
            padding: 0;
            padding-top: 0;
            min-height: 0;
            transition: margin-left 0.3s ease;
        }

        #game-container.main-content.expanded {
            margin-left: 0;
        }

        body.target-mode #game-container {
            margin-left: 0;
        }

        @media (max-width: 768px) {
            #game-container.main-content {
                margin-left: 0;
            }
        }

        #header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 90%;
            max-width: 700px;
            padding: 10px 0;
        }

        #title {
            font-family: 'Press Start 2P', monospace;
            font-size: 24px;
            color: var(--gold);
            text-shadow: 0 0 10px var(--ring-glow), 0 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 4px;
        }

        #score-display {
            font-size: 28px;
            color: var(--retro-green);
            text-shadow: 0 0 8px rgba(51, 255, 51, 0.5);
        }

        #board-area {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 90%;
            max-width: 750px;
            justify-content: center;
        }

        #board-wrapper {
            position: relative;
            flex: 1;
            max-width: 700px;
            aspect-ratio: 7 / 10;
            max-height: 80vh;
        }
        #board-wrapper.circular {
            aspect-ratio: 1 / 1;
            max-width: 80vh;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 12px;
            border: 3px solid var(--board-border);
            box-shadow: 0 0 30px var(--board-glow), inset 0 0 60px rgba(0,0,0,0.5);
        }
        #board-wrapper.circular canvas {
            border-radius: 50%;
        }

        #controls {
            display: flex;
            gap: 16px;
            padding: 12px 0;
            align-items: center;
        }

        .btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            padding: 10px 20px;
            border: 2px solid var(--board-border);
            background: var(--panel-bg);
            color: var(--text-color);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }
        .btn:hover {
            background: var(--btn-hover-bg);
            border-color: var(--gold);
            color: var(--gold);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
        }
        .btn.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: var(--gold);
            color: var(--gold);
        }

        #drop-indicator {
            font-size: 20px;
            color: var(--text-color);
            opacity: 0.7;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Press Start 2P', monospace;
            font-size: 18px;
            color: var(--gold);
            text-shadow: 0 0 20px var(--ring-glow);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-align: center;
            z-index: 100;
        }
        #message.visible {
            opacity: 1;
        }

        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #modal-overlay.open {
            display: flex;
        }

        #options-modal {
            background: var(--modal-bg);
            border: 2px solid var(--board-border);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(74, 42, 138, 0.6);
        }

        #options-modal h2 {
            font-family: 'Press Start 2P', monospace;
            font-size: 16px;
            color: var(--gold);
            margin-bottom: 24px;
            text-align: center;
            text-shadow: 0 0 8px var(--ring-glow);
        }

        .opt-group {
            margin-bottom: 20px;
        }
        .opt-group label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            color: var(--text-color);
            margin-bottom: 6px;
        }
        .opt-group label span.opt-val {
            color: var(--retro-green);
            font-size: 16px;
            min-width: 50px;
            text-align: right;
        }

        .opt-group input[type="range"] {
            width: 100%;
            accent-color: var(--board-border);
            height: 6px;
            cursor: pointer;
        }

        .opt-section-title {
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            color: var(--gold);
            margin: 20px 0 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(74, 42, 138, 0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .opt-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }


        .shape-toggle {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .shape-btn {
            font-size: 9px !important;
            padding: 8px 14px !important;
            flex: 1;
        }

        .theme-toggle {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 6px;
        }
        .theme-btn {
            font-size: 9px !important;
            padding: 8px 10px !important;
            flex: 1;
            white-space: nowrap;
        }
        .theme-swatch {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.3);
        }

        .ring-color-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ring-color-controls .btn {
            font-size: 8px;
            padding: 6px 10px;
        }
        .ring-color-controls input[type="color"] {
            width: 52px;
            height: 30px;
            padding: 0;
            border: 2px solid var(--board-border);
            border-radius: 6px;
            background: none;
            cursor: pointer;
        }

        #modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 24px;
        }

        /* Target-only mode (pop-out window) */
        body.target-mode #game-container { justify-content: center; align-items: center; }
        body.target-mode #header,
        body.target-mode #controls,
        body.target-mode #control-panel,
        body.target-mode #keystroke-flash,
        body.target-mode #modal-overlay,
        body.target-mode #shared-navigation,
        body.target-mode .sidebar,
        body.target-mode .btn-popout { display: none !important; }
        body.target-mode #board-area {
            width: auto;
            max-width: none;
        }
        body.target-mode #board-wrapper {
            flex: 0 0 auto;
            width: auto;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
        }
        body.target-mode #board-wrapper.circular {
            width: auto;
            height: 100vh;
            max-width: 100vw;
        }
        body.target-mode canvas {
            border: none;
            border-radius: 0;
            box-shadow: none;
        }
        body.target-mode #board-wrapper.circular canvas {
            border-radius: 50%;
        }

        /* M3 logo + target-face alignment (target window only) */
        .m3-logo-branding,
        .m3-logo-hint,
        #align-modal-overlay,
        #alignment-hint,
        #alignment-lock-bar { display: none; }

        body.target-mode .m3-logo-branding {
            display: block;
            position: fixed;
            bottom: 2vmin;
            left: 50%;
            transform: translateX(-50%);
            height: 6vmin;
            width: auto;
            z-index: 10001;
            cursor: pointer;
            opacity: 0.85;
            animation: m3-logo-glow 3.5s ease-out forwards;
        }
        body.target-mode .m3-logo-branding:hover { opacity: 1; }
        body.target-mode .m3-logo-hint {
            display: block;
            position: fixed;
            bottom: 10vmin;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'VT323', monospace;
            font-size: 22px;
            color: var(--gold);
            text-shadow: 0 0 10px var(--ring-glow);
            pointer-events: none;
            white-space: nowrap;
            z-index: 10001;
            animation: m3-hint-fade 3.5s ease-out forwards;
        }
        @keyframes m3-logo-glow {
            0%   { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 1)) drop-shadow(0 0 14px rgba(255, 215, 0, 0.8)); }
            85%  { filter: drop-shadow(0 0 5px rgba(255, 215, 0, 1)) drop-shadow(0 0 14px rgba(255, 215, 0, 0.8)); }
            100% { filter: none; }
        }
        @keyframes m3-hint-fade {
            0%  { opacity: 1; }
            85% { opacity: 1; }
            100% { opacity: 0; }
        }

        body.target-mode #align-modal-overlay.open {
            display: flex;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            align-items: center;
            justify-content: center;
            z-index: 10002;
        }
        #align-modal {
            background: var(--modal-bg);
            border: 2px solid var(--board-border);
            border-radius: 12px;
            padding: 30px;
            min-width: 280px;
            text-align: center;
            box-shadow: 0 0 40px rgba(74, 42, 138, 0.6);
        }
        #align-modal h2 {
            font-family: 'Press Start 2P', monospace;
            font-size: 14px;
            color: var(--gold);
            margin-bottom: 20px;
            text-shadow: 0 0 8px var(--ring-glow);
        }
        #align-modal .btn {
            display: block;
            width: 100%;
            margin-bottom: 10px;
        }
        #align-modal .align-note {
            font-size: 18px;
            color: var(--text-color);
            opacity: 0.6;
            margin-top: 8px;
        }

        body.target-mode.alignment-mode #alignment-hint {
            display: block;
            position: fixed;
            top: 6vh;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'VT323', monospace;
            font-size: 26px;
            color: var(--text-color);
            opacity: 0.85;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            white-space: nowrap;
            z-index: 10001;
        }
        body.target-mode.alignment-mode #alignment-lock-bar {
            display: flex;
            position: fixed;
            top: 12vh;
            left: 50%;
            transform: translateX(-50%);
            gap: 14px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10001;
        }
        #alignment-lock-bar label {
            font-family: 'VT323', monospace;
            font-size: 22px;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #alignment-lock-bar input[type="range"] {
            width: 160px;
            accent-color: var(--gold);
            cursor: pointer;
        }
        body.target-mode.alignment-mode #board-wrapper { cursor: grab; }
        body.target-mode.alignment-mode.align-dragging,
        body.target-mode.alignment-mode.align-dragging #board-wrapper { cursor: grabbing; }

        /* Control panel mode (main window with pop-out active) */

        #control-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 16px 0;
            width: 90%;
            max-width: 700px;
        }
        body.control-mode #control-panel { display: flex; }

        #panel-status {
            display: flex;
            gap: 24px;
            align-items: center;
            font-size: 22px;
            color: var(--text-color);
        }
        #panel-status .status-label {
            color: var(--gold);
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            letter-spacing: 1px;
        }
        #panel-status .status-value {
            color: var(--retro-green);
            font-size: 26px;
        }

        #keystroke-flash {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--gold);
            opacity: 0;
            transition: opacity 0.05s;
            z-index: 9998;
            pointer-events: none;
        }
        #keystroke-flash.flash {
            opacity: 1;
            transition: opacity 0s;
        }

        #panel-game-state {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            padding: 8px 16px;
            border-radius: 6px;
            border: 2px solid var(--board-border);
            background: var(--panel-bg);
        }
        #panel-game-state.state-ready { color: var(--retro-green); border-color: var(--retro-green); }
        #panel-game-state.state-falling { color: var(--gold); border-color: var(--gold); }
        #panel-game-state.state-paused { color: #ff8800; border-color: #ff8800; }

        .btn-popout {
            background: none;
            border: none;
            padding: 6px;
            cursor: pointer;
            font-size: 28px;
            line-height: 1;
            filter: drop-shadow(0 0 6px var(--ring-glow));
            animation: popout-pulse 2s ease-in-out infinite;
        }
        .btn-popout:hover {
            filter: drop-shadow(0 0 12px var(--ring-glow));
            animation: none;
            transform: scale(1.15);
        }
        .btn-popout.active {
            animation: none;
            filter: drop-shadow(0 0 8px rgba(51, 255, 51, 0.8));
        }

        @keyframes popout-pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        #players-panel {
            width: 90%;
            max-width: 700px;
            margin-top: 12px;
        }
        #players-add {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        #players-add input {
            flex: 1;
            font-family: 'VT323', monospace;
            font-size: 18px;
            padding: 6px 12px;
            border: 2px solid var(--board-border);
            border-radius: 6px;
            background: var(--panel-bg);
            color: var(--text-color);
            outline: none;
        }
        #players-add input:focus {
            border-color: var(--gold);
        }
        #players-add input::placeholder {
            color: rgba(200, 180, 255, 0.4);
        }
        #player-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .player-card {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border: 2px solid var(--board-border);
            border-radius: 6px;
            background: var(--panel-bg);
            font-family: 'VT323', monospace;
            font-size: 18px;
            color: var(--text-color);
            transition: all 0.2s;
        }
        .player-card.active {
            border-color: var(--gold);
            background: rgba(255, 215, 0, 0.1);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        .player-card .player-name {
            color: var(--text-color);
        }
        .player-card.active .player-name {
            color: var(--gold);
        }
        .player-card .player-score {
            color: var(--retro-green);
            font-size: 20px;
            min-width: 40px;
            text-align: right;
        }
        .player-card .player-remove {
            cursor: pointer;
            color: rgba(255, 100, 100, 0.5);
            font-size: 14px;
            margin-left: 4px;
        }
        .player-card .player-remove:hover {
            color: #ff4444;
        }
        body.target-mode #players-panel { display: none !important; }
    </style>
</head>
<body>
<div id="shared-navigation"></div>
<div id="game-container" class="main-content">
    <div id="header">
        <div id="title">KLINKO</div>
        <div id="score-display">SCORE: <span id="score">0</span></div>
    </div>
    <div id="board-area">
        <div id="board-wrapper">
            <canvas id="board"></canvas>
            <div id="message"></div>
        </div>
        <button class="btn-popout" id="btn-popout" title="Open target on projector">📽️</button>
    </div>
    <div id="controls">
        <span id="drop-indicator">SPACE: START / PAUSE — CLICK PAUSED RING = HIT</span>
        <button class="btn" id="btn-drop">DROP</button>
        <button class="btn" id="btn-reset">RESET</button>
        <button class="btn" id="btn-options">OPTIONS</button>
    </div>
    <div id="players-panel">
        <div id="players-add">
            <input type="text" id="player-name-input" placeholder="Player name..." maxlength="20">
            <button class="btn" id="btn-add-player">ADD</button>
        </div>
        <div id="player-list"></div>
    </div>
    <div id="control-panel">
        <div id="panel-status">
            <div><span class="status-label">SCORE</span><br><span class="status-value" id="panel-score">0</span></div>
            <div><span class="status-label">STATE</span><br><span id="panel-game-state" class="state-ready">READY</span></div>
        </div>
    </div>
    <div id="keystroke-flash"></div>
</div>

<div id="modal-overlay">
    <div id="options-modal">
        <h2>OPTIONS</h2>

        <div class="opt-section-title">Physics</div>
        <div class="opt-group">
            <label>Game Speed <span class="opt-val" id="val-speed">1.0</span></label>
            <input type="range" id="opt-speed" min="0.1" max="1.5" step="0.1" value="1.0">
        </div>
        <div class="opt-group">
            <label>Gravity <span class="opt-val" id="val-gravity">0.35</span></label>
            <input type="range" id="opt-gravity" min="0.1" max="1.0" step="0.05" value="0.35">
        </div>
        <div class="opt-group">
            <label>Bounce <span class="opt-val" id="val-bounce">0.55</span></label>
            <input type="range" id="opt-bounce" min="0.1" max="0.9" step="0.05" value="0.55">
        </div>
        <div class="opt-group">
            <label>Randomness <span class="opt-val" id="val-random">1.5</span></label>
            <input type="range" id="opt-random" min="0" max="4.0" step="0.25" value="1.5">
        </div>

        <div class="opt-section-title">Board</div>
        <div class="opt-group">
            <label>Shape</label>
            <div class="shape-toggle" id="shape-toggle">
                <button class="btn shape-btn active" data-shape="rect">RECTANGLE</button>
                <button class="btn shape-btn" data-shape="circle">LOG ROUND</button>
            </div>
        </div>
        <div class="opt-group">
            <label>Peg Density <span class="opt-val" id="val-density">5</span></label>
            <input type="range" id="opt-density" min="1" max="10" step="1" value="5">
        </div>
        <div class="opt-row">
            <div class="opt-group">
                <label>Peg Size <span class="opt-val" id="val-pegsize">8</span></label>
                <input type="range" id="opt-pegsize" min="4" max="16" step="1" value="8">
            </div>
            <div class="opt-group">
                <label>Ring Size <span class="opt-val" id="val-ringsize">14</span></label>
                <input type="range" id="opt-ringsize" min="8" max="24" step="1" value="14">
            </div>
        </div>
        <div class="opt-group">
            <label>Board Size <span class="opt-val" id="val-boardsize">100%</span></label>
            <input type="range" id="opt-boardsize" min="30" max="100" step="5" value="100">
        </div>

        <div class="opt-section-title">Color Theme</div>
        <div class="opt-group">
            <div class="theme-toggle" id="theme-toggle">
                <button class="btn theme-btn" data-theme="classic"><span class="theme-swatch" style="background:#ffd700"></span>GOLD</button>
                <button class="btn theme-btn" data-theme="ice"><span class="theme-swatch" style="background:#00e5ff"></span>ICE</button>
                <button class="btn theme-btn" data-theme="ember"><span class="theme-swatch" style="background:#ff6a00"></span>EMBER</button>
                <button class="btn theme-btn" data-theme="emerald"><span class="theme-swatch" style="background:#33ff88"></span>EMERALD</button>
                <button class="btn theme-btn" data-theme="synthwave"><span class="theme-swatch" style="background:#ff44cc"></span>SYNTH</button>
                <button class="btn theme-btn" data-theme="cloud"><span class="theme-swatch" style="background:#eef3fa"></span>CLOUD</button>
            </div>
        </div>
        <div class="opt-group">
            <label>Ring Color
                <span class="ring-color-controls">
                    <button class="btn" id="btn-ringcolor-reset" title="Reset to gold">RESET</button>
                    <input type="color" id="opt-ringcolor" value="#ffd700" title="Pick ring color">
                </span>
            </label>
        </div>

        <div id="modal-buttons">
            <button class="btn" id="btn-defaults">DEFAULTS</button>
            <button class="btn" id="btn-apply">APPLY</button>
